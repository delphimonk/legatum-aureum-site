<!doctype html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Legatum Aureum</title>
<meta name="robots" content="noindex, nofollow">
<link rel="icon" href="favicon.ico" sizes="any">
<link rel="icon" href="assets/favicon-32x32.png" type="image/png" sizes="32x32">
<link rel="icon" href="assets/favicon-16x16.png" type="image/png" sizes="16x16">
<link rel="apple-touch-icon" href="assets/apple-touch-icon.png">
<style>
  :root {
    --bg: #0a0908;
    --gold: #c9a24b;
    --gold-soft: #e7c988;
    --ink: #f3ede2;
    --ink-dim: rgba(243, 237, 226, 0.55);
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  html, body {
    height: 100%;
    background: var(--bg);
    overflow: hidden;
  }

  body {
    font-family: "Helvetica Neue", Arial, sans-serif;
    color: var(--ink);
    display: flex;
    align-items: center;
    justify-content: center;
    position: relative;
  }

  canvas#scene {
    position: fixed;
    inset: 0;
    display: block;
  }

  .vignette {
    position: fixed;
    inset: 0;
    pointer-events: none;
    background: radial-gradient(ellipse at center, transparent 0%, transparent 45%, var(--bg) 100%);
  }

  .content {
    position: relative;
    z-index: 2;
    text-align: center;
    padding: 2rem;
    display: flex;
    flex-direction: column;
    align-items: center;
  }

  .logo-wrap {
    position: relative;
    display: inline-block;
  }

  .logo {
    position: relative;
    z-index: 1;
    width: clamp(220px, 24vw, 340px);
    height: auto;
    filter: invert(1) brightness(1.35) sepia(0.55) saturate(3) hue-rotate(-10deg);
    opacity: 0.97;
    display: block;
  }

  .logo-shadow {
    position: absolute;
    left: 50%;
    bottom: -6%;
    transform: translateX(-50%);
    width: 78%;
    height: 22%;
    background: radial-gradient(ellipse at center, rgba(201, 162, 75, 0.55) 0%, rgba(201, 162, 75, 0.18) 45%, transparent 75%);
    filter: blur(14px);
    z-index: 0;
  }

  .contact {
    margin-top: 2.75rem;
  }

  .contact a {
    display: inline-block;
    font-family: "Helvetica Neue", Arial, sans-serif;
    font-size: 0.72rem;
    letter-spacing: 0.28em;
    text-transform: uppercase;
    color: var(--ink-dim);
    text-decoration: none;
    border-bottom: 1px solid transparent;
    padding-bottom: 0.35rem;
    transition: color 0.3s ease, border-color 0.3s ease;
  }

  .contact a:hover,
  .contact a:focus {
    color: var(--gold-soft);
    border-color: var(--gold);
  }

  footer {
    position: fixed;
    bottom: 1.75rem;
    left: 0;
    right: 0;
    z-index: 2;
    text-align: center;
    font-size: 0.68rem;
    letter-spacing: 0.22em;
    text-transform: uppercase;
    color: var(--ink-dim);
  }

</style>
</head>
<body>

<canvas id="scene"></canvas>
<div class="vignette"></div>

<div class="content">
  <div class="logo-wrap">
    <img class="logo" src="assets/logo.png" alt="Legatum Aureum">
    <div class="logo-shadow"></div>
  </div>
  <div class="contact">
    <a href="mailto:admin@legatumaureum.com">Contact</a>
  </div>
</div>

<footer>&copy; <span id="year"></span> Legatum Aureum</footer>

<script src="https://unpkg.com/three@0.160.0/build/three.min.js"></script>
<script>
  document.getElementById('year').textContent = new Date().getFullYear();

  (function () {
    var canvas = document.getElementById('scene');
    if (typeof THREE === 'undefined') return;

    var renderer = new THREE.WebGLRenderer({ canvas: canvas, antialias: true, alpha: true });
    renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
    renderer.setSize(window.innerWidth, window.innerHeight);

    var scene = new THREE.Scene();
    var camera = new THREE.PerspectiveCamera(45, window.innerWidth / window.innerHeight, 0.1, 100);
    camera.position.set(0, 0, 7.5);

    var group = new THREE.Group();
    scene.add(group);

    var geometry = new THREE.IcosahedronGeometry(2.1, 0);
    var material = new THREE.MeshBasicMaterial({
      color: 0x4f7ea8,
      wireframe: true,
      transparent: true,
      opacity: 0.16
    });
    var mesh = new THREE.Mesh(geometry, material);
    group.add(mesh);

    var innerGeometry = new THREE.IcosahedronGeometry(1.35, 0);
    var innerMaterial = new THREE.MeshBasicMaterial({
      color: 0x8fb4d4,
      wireframe: true,
      transparent: true,
      opacity: 0.10
    });
    var innerMesh = new THREE.Mesh(innerGeometry, innerMaterial);
    group.add(innerMesh);

    var particleCount = 220;
    var positions = new Float32Array(particleCount * 3);
    for (var i = 0; i < particleCount; i++) {
      var r = 4.5 + Math.random() * 3.5;
      var theta = Math.random() * Math.PI * 2;
      var phi = Math.acos((Math.random() * 2) - 1);
      positions[i * 3] = r * Math.sin(phi) * Math.cos(theta);
      positions[i * 3 + 1] = r * Math.sin(phi) * Math.sin(theta);
      positions[i * 3 + 2] = r * Math.cos(phi);
    }
    var particleGeometry = new THREE.BufferGeometry();
    particleGeometry.setAttribute('position', new THREE.BufferAttribute(positions, 3));

    var dotCanvas = document.createElement('canvas');
    dotCanvas.width = 64;
    dotCanvas.height = 64;
    var dotCtx = dotCanvas.getContext('2d');
    var dotGradient = dotCtx.createRadialGradient(32, 32, 0, 32, 32, 32);
    dotGradient.addColorStop(0, 'rgba(255,255,255,1)');
    dotGradient.addColorStop(0.4, 'rgba(255,255,255,0.9)');
    dotGradient.addColorStop(1, 'rgba(255,255,255,0)');
    dotCtx.fillStyle = dotGradient;
    dotCtx.fillRect(0, 0, 64, 64);
    var dotTexture = new THREE.CanvasTexture(dotCanvas);

    var particleMaterial = new THREE.PointsMaterial({
      color: 0x4f7ea8,
      size: 0.06,
      map: dotTexture,
      transparent: true,
      opacity: 0.65,
      depthWrite: false,
      blending: THREE.AdditiveBlending
    });
    var particles = new THREE.Points(particleGeometry, particleMaterial);
    scene.add(particles);

    function onResize() {
      camera.aspect = window.innerWidth / window.innerHeight;
      camera.updateProjectionMatrix();
      renderer.setSize(window.innerWidth, window.innerHeight);
    }
    window.addEventListener('resize', onResize);

    var reduceMotion = window.matchMedia('(prefers-reduced-motion: reduce)').matches;

    function animate() {
      requestAnimationFrame(animate);
      if (!reduceMotion) {
        group.rotation.y += 0.0013;
        group.rotation.x += 0.0006;
        particles.rotation.y -= 0.0004;
      }
      renderer.render(scene, camera);
    }
    animate();
  })();
</script>

</body>
</html>
